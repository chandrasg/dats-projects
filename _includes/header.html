<header class="site-header">
  <div class="container header-inner">
    <a href="{{ '/' | relative_url }}" class="site-title">
      <span class="site-title-main">DATS Practicum & Thesis</span>
      <span class="site-title-sub">Penn Data Science MSE</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav(this)">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/get-started/' | relative_url }}" {% if page.url contains 'get-started' %}class="active"{% endif %}>Get Started</a>
      <a href="{{ '/guidelines/' | relative_url }}" {% if page.url contains 'guidelines' %}class="active"{% endif %}>Guidelines</a>
      <a href="{{ '/timeline/' | relative_url }}" {% if page.url contains 'timeline' %}class="active"{% endif %}>Timeline</a>
      <a href="{{ '/faq/' | relative_url }}" {% if page.url contains 'faq' %}class="active"{% endif %}>FAQ</a>
      <a href="{{ '/resources/' | relative_url }}" {% if page.url contains 'resources' %}class="active"{% endif %}>Resources</a>
    </nav>
  </div>
</header>
<script>
function toggleNav(btn) {
  const header = btn.closest('.site-header');
  const isOpen = header.classList.toggle('nav-open');
  btn.setAttribute('aria-expanded', isOpen);
}
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.site-nav a').forEach(function(link) {
    link.addEventListener('click', function() {
      const header = document.querySelector('.site-header');
      header.classList.remove('nav-open');
      document.querySelector('.nav-toggle').setAttribute('aria-expanded', 'false');
    });
  });
});
</script>
